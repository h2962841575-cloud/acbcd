<script>
    (function() {
        // ========== 版本控制 ==========
        var CURRENT_VERSION = '3.3.20260715';
        var storedVersion = localStorage.getItem('app_version');
        if (storedVersion !== CURRENT_VERSION) {
            localStorage.setItem('app_version', CURRENT_VERSION);
            if (storedVersion !== null) {
                alert('检测到新版本，即将刷新页面以确保功能正常。');
                location.reload(true);
                return;
            }
        }

        // ========== 全局变量 ==========
        var WIDTH = 1.73, TRUE_DENSITY = 3.42, CONST_TERM = 760653 / 772512500;
        var STORE_KEY = 'feederAppData';
        var WORKER_BASE = 'https://webhook-proxy.h2962841575.workers.dev';
        var WEBHOOK_URL = WORKER_BASE + '/send';
        var UPLOAD_URL = WORKER_BASE + '/upload';

        // ========== 数据管理 ==========
        function getDefaultStore() {
            var now = new Date(); var h = now.getHours(); var shift = (h >= 7 && h < 19) ? 'day' : 'night';
            return {
                machine: '1#',
                machineParams: {
                    '1#': { height: 1.0, bulk: 1.69, moisture: '' },
                    '2#': { height: 1.0, bulk: 1.69, moisture: '' },
                    '3#': { height: 1.0, bulk: 1.69, moisture: '' },
                    '4#': { height: 1.0, bulk: 1.69, moisture: '' },

                },
                shift: shift,
                shiftTimes: { dayStart: '07:00', dayEnd: '19:00', nightStart: '19:00', nightEnd: '07:00' },
                segments: [],
                history: [],
                segCounter: 0,
                deletedItems: null
            };
        }

        var appData = (function() {
            try {
                var raw = localStorage.getItem(STORE_KEY);
                if (raw) {
                    var data = JSON.parse(raw), def = getDefaultStore();
                    for (var key in def) if (!(key in data)) data[key] = def[key];
                    if (!data.machineParams) data.machineParams = def.machineParams;
                    if (!data.shiftTimes) data.shiftTimes = def.shiftTimes;
                    if (!data.segments) data.segments = [];
                    if (!data.history) data.history = [];
                    if (data.segCounter === undefined) data.segCounter = 0;
                    for (var m in def.machineParams) if (!data.machineParams[m]) data.machineParams[m] = def.machineParams[m];
                    return data;
                }
            } catch(e) {}
            return getDefaultStore();
        })();

        function saveData() {
            try {
                localStorage.setItem(STORE_KEY, JSON.stringify(appData));
                document.getElementById('appStatus').textContent = '● 已保存';
                document.getElementById('appStatus').style.color = '#059669';
                setTimeout(function() { document.getElementById('appStatus').style.color = '#94a3b8'; }, 2000);
            } catch(e) {}
        }

        // ========== 工具函数 ==========
        function fmt(v, d) { return (v === undefined || v === null || !isFinite(v)) ? '--' : Number(v.toFixed(d)); }
        function fmtPct(v) { return isNaN(v) ? '--' : (v * 100).toFixed(2) + '%'; }

        function getEffectiveWater(bulk) {
            var val = document.getElementById('defMoisture').value.trim();
            if (val !== '') { var n = parseFloat(val); if (!isNaN(n) && n >= 0 && n <= 100) return { water: n / 100, source: '自定义' }; }
            if (bulk > 0 && bulk < TRUE_DENSITY) {
                var water = (TRUE_DENSITY - bulk) / ((TRUE_DENSITY - 1) * bulk);
                return { water: water, source: '公式反推' };
            }
            return { water: NaN, source: '无效' };
        }

        function calcThroughput(height, freq, bulk, water) {
            if (isNaN(water) || !isFinite(water) || height <= 0 || bulk <= 0) return { wet: NaN, dry: NaN, speed: NaN };
            var speed = 0.002 * freq - CONST_TERM;
            if (speed <= 0) return { wet: NaN, dry: NaN, speed: speed };
            var wet = WIDTH * height * speed * bulk * 3600;
            var dry = wet * (1 - water);
            return { wet: wet, dry: dry, speed: speed };
        }

        function inverseFreq(height, bulk, hours, targetDry, water) {
            if (isNaN(water) || !isFinite(water) || hours <= 0 || targetDry <= 0) return { freq: NaN };
            var denom = WIDTH * height * bulk * 3600 * (1 - water);
            if (denom <= 0) return { freq: NaN };
            return { freq: (targetDry / hours / denom + CONST_TERM) / 0.002 };
        }

        function timeToHours(h, m) { return h + m / 60; }
        function parseTimeStr(str) {
            var p = str.split(':'); if (p.length !== 2) return null;
            var h = parseInt(p[0]), m = parseInt(p[1]);
            return (isNaN(h) || isNaN(m) || h < 0 || h > 23 || m < 0 || m > 59) ? null : { h: h, m: m };
        }

        function getCurrentMachine() { return appData.machine; }
        function getMachineParams(machine) {
            if (!appData.machineParams[machine]) appData.machineParams[machine] = { height: 1.0, bulk: 1.69, moisture: '' };
            return appData.machineParams[machine];
        }

        function loadMachineParams(machine) {
            var p = getMachineParams(machine);
            document.getElementById('defHeight').value = p.height;
            document.getElementById('defBulk').value = p.bulk;
            document.getElementById('defMoisture').value = p.moisture || '';
            updateMoistureHint();
            renderLookup();
            updateTemplateHint();
            renderSegments();
            saveData();
        }

        function saveCurrentTemplate() {
            var machine = getCurrentMachine();
            var h = parseFloat(document.getElementById('defHeight').value) || 0;
            var b = parseFloat(document.getElementById('defBulk').value) || 0;
            var m = document.getElementById('defMoisture').value.trim();
            if (h <= 0 || b <= 0) { alert('高度和堆密度须大于0'); return; }
            appData.machineParams[machine] = { height: h, bulk: b, moisture: m };
            updateMoistureHint();
            renderLookup();
            updateTemplateHint();
            renderSegments();
            saveData();
            showToast('✅ 模板已保存');
        }

        function resetTemplate() {
            var machine = getCurrentMachine();
            appData.machineParams[machine] = { height: 1.0, bulk: 1.69, moisture: '' };
            loadMachineParams(machine);
            showToast('↩️ 已恢复默认');
        }

        function updateTemplateHint() {
            var p = getMachineParams(getCurrentMachine());
            var el = document.getElementById('templateHint');
            var isDefault = (p.height === 1.0 && p.bulk === 1.69 && p.moisture === '');
            el.textContent = isDefault ? '参数: 默认' : '参数: 已定制 ✓';
            el.style.color = isDefault ? '#94a3b8' : '#059669';
            document.querySelectorAll('.machine-bar .mbtn').forEach(function(b) {
                var m = b.dataset.m;
                var pp = getMachineParams(m);
                var def = (pp.height === 1.0 && pp.bulk === 1.69 && pp.moisture === '');
                b.classList.toggle('template-saved', !def);
            });
        }

        function initShift() {
            var shift = appData.shift || 'day';
            document.querySelectorAll('.shift-selector .sbtn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.shift === shift);
            });
            updateShiftDisplay();
            var times = getShiftTimes(shift);
            if (times) {
                setTimeInputs('invStart', times.start);
                setTimeInputs('invEnd', times.end);
            }
        }

        function getShiftTimes(shift) {
            var st = appData.shiftTimes;
            if (shift === 'day') {
                var s = parseTimeStr(st.dayStart);
                var e = parseTimeStr(st.dayEnd);
                if (s && e) return { start: s, end: e };
            } else {
                var s = parseTimeStr(st.nightStart);
                var e = parseTimeStr(st.nightEnd);
                if (s && e) return { start: s, end: e };
            }
            return null;
        }

        function updateShiftDisplay() {
            var shift = appData.shift || 'day';
            var times = getShiftTimes(shift);
            var el = document.getElementById('shiftTimeDisplay');
            if (times) {
                var sh = String(times.start.h).padStart(2,'0') + ':' + String(times.start.m).padStart(2,'0');
                var eh = String(times.end.h).padStart(2,'0') + ':' + String(times.end.m).padStart(2,'0');
                el.textContent = sh + '-' + eh;
            } else {
                el.textContent = '--:--';
            }
        }

        function setTimeInputs(prefix, t) {
            var hEl = document.getElementById(prefix + 'H');
            var mEl = document.getElementById(prefix + 'M');
            if (hEl) hEl.value = t.h;
            if (mEl) mEl.value = t.m;
        }

        // ========== 时段管理 ==========
        function getSegments() { return appData.segments || []; }
        function saveSegments(segs) { appData.segments = segs; renderSegments(); updateSegStats(); saveData(); }

        function addSegmentFromNow() { /* ... 与原来相同，略 */ }
        function deleteSegment(id) { /* ... 略 */ }
        function duplicateSegment(id) { /* ... 略 */ }
        function clearAllSegments() { /* ... 略 */ }
        function renderSegments() { /* ... 略 */ }
        function bindSegmentEvents() { /* ... 略 */ }
        function updateSegmentFromDOM(id) { /* ... 略 */ }
        function updateSegInfo(el, seg, idx) { /* ... 略 */ }

        // 为了节省篇幅，从原代码中复制这些函数，它们没有改变，此处省略具体实现。
        // 但在你的最终文件中，请保留所有原有函数（计算、历史等）不变。

        // ========== 进度遮罩 ==========
        var progressOverlay = null;

        function showProgress(text) {
            if (!progressOverlay) {
                progressOverlay = document.createElement('div');
                progressOverlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;';
                progressOverlay.innerHTML = `

                        <div style="display:inline-block;width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;"></div>

            } else {

        // ========== 分享核心函数（修复） ==========

        // 上传文件到企业微信（通过 Worker 代理）
        function uploadMedia(blob, filename, type) {
            if (!blob) {
                return Promise.reject(new Error('文件数据为空，请重新生成'));
            }
            if (blob.size === 0) {
                return Promise.reject(new Error('文件大小为 0，请检查数据是否生成正确'));
            }
            if (!filename) {
                return Promise.reject(new Error('文件名缺失'));
            }
            var url = UPLOAD_URL + '?type=' + encodeURIComponent(type);
            var formData = new FormData();
            formData.append('media', blob, filename);
            return fetch(url, {
                method: 'POST',
                body: formData
            }).then(function(resp) {
                if (!resp.ok) {
                    return resp.text().then(function(text) {
                        throw new Error('上传失败: ' + text);
                    });
                }
                return resp.json();
            }).then(function(json) {
                if (json.errcode !== 0) {
                    throw new Error(json.errmsg || '上传失败，errcode: ' + json.errcode);
                }
                return json.media_id;
            });
        }

        // 发送 Markdown 消息
        function sendMarkdown(content) {
            var payload = {
                msgtype: 'markdown',
                markdown: { content: content }
            };
            return fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(function(resp) {
                return resp.json();
            }).then(function(json) {
                if (json.errcode !== 0) {
                    throw new Error(json.errmsg || '发送失败，errcode: ' + json.errcode);
                }
                return json;
            });
        }

        function sendImage(mediaId) {

        function sendFile(mediaId) {

                msgtype: 'file',

            return fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)

                return resp.json();
            }).then(function(json) {
                if (json.errcode !== 0) {
                    throw new Error(json.errmsg || '发送文件失败，errcode: ' + json.errcode);

        // 构建分享文本
        function buildShareMessage(record, type) {
            var lines = [];
            lines.push('# 📊 给矿量数据分享');
            lines.push('**时间**：' + (record.datetime || new Date().toLocaleString('zh-CN', { hour12: false })));
            lines.push('**重板**：' + (record.machineId || '--'));
            lines.push('**班次**：' + (record.shift || '--'));
            lines.push('**总时长**：' + fmt(record.totalHours, 2) + ' h');
            lines.push('**湿矿总量**：' + fmt(record.totalWet, 2) + ' t');
            lines.push('**干矿总量**：' + fmt(record.totalDry, 2) + ' t');
            if (record.remark) lines.push('**备注**：' + record.remark);
            if (record.segments && record.segments.length) {
                lines.push('> **分段明细**');
                record.segments.forEach(function(seg, idx) {
                    lines.push('> ' + (idx+1) + '. ' + seg.start + '~' + seg.end + '  ' + seg.freq + 'Hz  ' +
                        '湿' + fmt(seg.wet,2) + 't 干' + fmt(seg.dry,2) + 't');
                });
            }
            if (type === 'current') {
                lines.push('---');
                lines.push('（本数据由**给矿量计算器**即时生成）');
            } else {
                lines.push('---');
                lines.push('（来自历史记录）');
            }
            return lines.join('\n');
        }

        // 获取当前累计数据对象
        function getCurrentRecord() {
            var dataStr = document.getElementById('segmentResult').dataset.data;
            if (!dataStr) return null;
            var data = JSON.parse(dataStr);
            if (!data.items || !data.items.length) return null;
            return {
                machineId: data.machineId || getCurrentMachine(),
                shift: appData.shift === 'day' ? '白班' : '夜班',
                totalHours: data.totalTime,
                totalWet: data.totalWet,
                totalDry: data.totalDry,
                datetime: new Date().toLocaleString('zh-CN', { hour12: false }),
                segments: data.items.map(function(it) {
                    return { start: it.start, end: it.end, freq: it.freq, hours: it.hours, wet: it.wet, dry: it.dry };
                }),
                remark: ''
            };
        }

        // 确认弹窗
        function showConfirmDialog(title, sub, previewText, onConfirm) {
            var overlay = document.getElementById('confirmOverlay');
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmSub').textContent = sub;
            document.getElementById('confirmPreview').textContent = previewText;
            document.getElementById('confirmStatus').textContent = '';
            overlay.classList.add('show');

            var sendBtn = document.getElementById('confirmSendBtn');
            var cancelBtn = document.getElementById('confirmCancelBtn');

            sendBtn.onclick = function() {
                sendBtn.disabled = true;
                sendBtn.textContent = '⏳ 发送中...';
                document.getElementById('confirmStatus').textContent = '⏳ 发送中...';
                document.getElementById('confirmStatus').style.color = '#d97706';
                onConfirm(function() {
                    document.getElementById('confirmStatus').textContent = '✅ 发送成功！';
                    document.getElementById('confirmStatus').style.color = '#059669';
                    sendBtn.textContent = '✅ 已发送';
                    setTimeout(function() {
                        overlay.classList.remove('show');
                        sendBtn.disabled = false;
                        sendBtn.textContent = '✅ 确认发送';
                    }, 1200);
                }, function(err) {
                    document.getElementById('confirmStatus').textContent = '❌ 发送失败：' + err.message;
                    document.getElementById('confirmStatus').style.color = '#dc2626';
                    sendBtn.textContent = '✅ 确认发送';
                    sendBtn.disabled = false;
                });
            };
            cancelBtn.onclick = function() {
                overlay.classList.remove('show');
                sendBtn.disabled = false;
                sendBtn.textContent = '✅ 确认发送';
                document.getElementById('confirmStatus').textContent = '';
            };
            overlay.onclick = function(e) { if (e.target === overlay) cancelBtn.onclick(); };
        }

        // ----- 2. 分享截图（修复：函数定义完整） -----
        function generateScreenshotBlob() {
            return new Promise(function(resolve, reject) {
                var dataStr = document.getElementById('segmentResult').dataset.data;
                if (!dataStr) {
                    reject(new Error('无数据，请先点击"计算累计"'));
                    return;
                }
                var data = JSON.parse(dataStr);
                if (!data.items || !data.items.length) {
                    reject(new Error('无有效数据'));
                    return;
                }

                // 构建报表 HTML
                var groups = {};
                data.items.forEach(function(item) {
                    var m = item.machine || '未指定';
                    if (!groups[m]) groups[m] = [];
                    groups[m].push(item);
                });
                var html = '', tTime = 0, tWet = 0, tDry = 0;
                Object.keys(groups).forEach(function(m) {
                    var items = groups[m], subT = 0, subW = 0, subD = 0;
                    html += '<div style="background:#dbeafe;padding:3px 8px;border-radius:4px;margin-top:4px;font-weight:600;border-left:3px solid #3b82f6;">📌 重板 ' + m + '</div>';
                    items.forEach(function(it, idx) {
                        subT += it.hours; subW += it.wet; subD += it.dry;
                        html += '<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px dashed #e2e8f0;"><span>时段' + (idx+1) + ' (' + it.start + '-' + it.end + ', ' + it.freq + 'Hz)</span><span>湿 ' + fmt(it.wet,2) + 't / 干 ' + fmt(it.dry,2) + 't</span></div>';
                    });
                    html += '<div style="background:#f1f5f9;padding:3px 8px;margin:2px 0 6px;">小计：' + fmt(subT,2) + 'h，湿 ' + fmt(subW,2) + 't，干 ' + fmt(subD,2) + 't</div>';
                    tTime += subT; tWet += subW; tDry += subD;
                });
                html += '<div style="background:#dbeafe;padding:5px 8px;border-radius:6px;margin-top:6px;font-weight:700;text-align:center;border:1px solid #93c5fd;">📊 总计：时长 ' + fmt(tTime,2) + 'h，湿矿 ' + fmt(tWet,2) + 't，干矿 ' + fmt(tDry,2) + 't</div>';

                var container = document.createElement('div');
                container.style.cssText = 'position:fixed;left:-9999px;width:440px;padding:24px 24px 20px;background:#fff;font-family:sans-serif;z-index:9999;border-radius:16px;';
                container.innerHTML = '<div style="text-align:center;margin-bottom:14px;padding-bottom:12px;border-bottom:3px solid #3b82f6;"><div style="font-size:20px;font-weight:700;">📊 给矿量累计报表</div><div style="font-size:12px;color:#94a3b8;">' + new Date().toLocaleString('zh-CN', { hour12: false }) + '</div></div><div style="font-size:13px;color:#475569;line-height:1.7;">' + html + '</div><div style="margin-top:14px;padding-top:12px;border-top:2px solid #3b82f6;display:flex;justify-content:space-between;font-weight:700;font-size:15px;"><span>📊 总计</span><span>时长 ' + fmt(tTime,2) + ' ｜ 湿矿 ' + fmt(tWet,2) + ' ｜ 干矿 ' + fmt(tDry,2) + '</span></div><div style="text-align:center;font-size:10px;color:#94a3b8;margin-top:10px;">重板给料机 · 给矿量报表</div>';
                document.body.appendChild(container);

                html2canvas(container, {
                    scale: 1.5,
                    useCORS: true,
                    backgroundColor: '#fff',
                    logging: false,
                    width: 440,
                }).then(function(canvas) {
                    document.body.removeChild(container);
                    return new Promise(function(res) {
                        canvas.toBlob(function(blob) {
                            res(blob);
                        }, 'image/png');
                    });
                }).then(function(blob) {
                    if (!blob || blob.size === 0) {
                        reject(new Error('生成图片失败，文件为空'));
                        return;
                    }
                    resolve(blob);
                }).catch(function(err) {
                    document.body.removeChild(container);
                    reject(err);
                });
            });
        }

        function shareCurrentScreenshot() {
            var record = getCurrentRecord();
            if (!record) { alert('请先点击"计算累计"生成结果'); return; }
            if (typeof html2canvas === 'undefined') { alert('截屏库未加载，请检查网络后重试'); return; }

            showConfirmDialog('🖼️ 确认发送截图到群', '点击确定后将开始生成截图，请耐心等待几秒钟。', '生成截图需要一定时间，请勿重复点击。', function(onSuccess, onError) {
                document.getElementById('confirmOverlay').classList.remove('show');
                showProgress('🖼️ 正在生成截图，请稍候...');

                generateScreenshotBlob().then(function(blob) {
                    if (!blob) {
                        hideProgress();
                        onError(new Error('生成图片失败，返回数据为空'));
                        return;
                    }
                    updateProgress('📤 正在上传截图...');
                    return uploadMedia(blob, '重板下料截图.png', 'image');
                }).then(function(mediaId) {
                    updateProgress('📨 正在发送图片到群...');
                    return sendImage(mediaId);
                }).then(function() {
                    hideProgress();
                    onSuccess();
                    showToast('🖼️ 截图已发送');
                }).catch(function(err) {
                    hideProgress();
                    onError(err);
                    alert('发送截图失败：' + err.message);
                });
            });
        }

        // ----- 3. 分享 Excel（修复：删除重复代码） -----
        function shareCurrentExcelWrapper() {
            var record = getCurrentRecord();
            if (!record) { alert('请先点击"计算累计"生成结果'); return; }
            if (typeof XLSX === 'undefined') { alert('Excel库未加载，请检查网络后重试'); return; }

            showConfirmDialog('📊 确认发送 Excel 文件到群', '点击确定后将开始生成 Excel，请稍候。', '文件包含：重板、时段、频率、时长、湿矿量、干矿量。', function(onSuccess, onError) {
                document.getElementById('confirmOverlay').classList.remove('show');
                showProgress('📊 正在生成 Excel 文件...');

                try {
                    var data = JSON.parse(document.getElementById('segmentResult').dataset.data);
                    var rows = [];
                    data.items.forEach(function(item, idx) {
                        rows.push({
                            '序号': idx + 1,
                            '重板': item.machine || '--',
                            '开始时间': item.start,
                            '结束时间': item.end,
                            '频率(Hz)': item.freq,
                            '运行时长(h)': Number(item.hours.toFixed(2)),
                            '湿矿量(t)': Number(item.wet.toFixed(2)),
                            '干矿量(t)': Number(item.dry.toFixed(2))
                        });
                    });
                    rows.push({
                        '序号': '总计',
                        '重板': '',
                        '开始时间': '',
                        '结束时间': '',
                        '频率(Hz)': '',
                        '运行时长(h)': Number(data.totalTime.toFixed(2)),
                        '湿矿量(t)': Number(data.totalWet.toFixed(2)),
                        '干矿量(t)': Number(data.totalDry.toFixed(2))
                    });

                    var ws = XLSX.utils.json_to_sheet(rows);
                    var wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, '给矿量明细');

                    var wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'base64' });
                    var byteCharacters = atob(wbout);
                    var byteNumbers = new Array(byteCharacters.length);
                    for (var i = 0; i < byteCharacters.length; i++) {
                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                    }
                    var byteArray = new Uint8Array(byteNumbers);
                    var blob = new Blob([byteArray], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

                    var filename = '重板给矿量_' + new Date().toISOString().slice(0,10) + '.xlsx';

                    updateProgress('📤 正在上传 Excel 文件...');
                    uploadMedia(blob, filename, 'file').then(function(mediaId) {
                        updateProgress('📨 正在发送文件到群...');
                        return sendFile(mediaId);
                    }).then(function() {
                        hideProgress();
                        onSuccess();
                        showToast('📊 Excel 已发送');
                    }).catch(function(err) {
                        hideProgress();
                        onError(err);
                        alert('发送 Excel 失败：' + err.message);
                    });
                } catch (e) {
                    hideProgress();
                    onError(e);
                    alert('生成 Excel 失败：' + e.message);
                }
            });
        }

        // ========== 初始化 ==========
        function init() {
            loadMachineParams(getCurrentMachine());
            initShift();
            document.getElementById('invStartH').value = new Date().getHours();
            document.getElementById('invStartM').value = new Date().getMinutes();
            renderSegments();
            updateSegStats();
            renderHistory();
            initHelp();

            // ===== 修复提醒弹窗 =====
            var reminderOverlay = document.getElementById('reminderOverlay');
            var closeBtn = document.getElementById('closeReminder');
            if (reminderOverlay && closeBtn) {
                // 检查是否已经点击过（通过 localStorage 记录）
                if (!localStorage.getItem('reminderClosed')) {
                    reminderOverlay.style.display = 'flex';
                } else {
                    reminderOverlay.style.display = 'none';
                }
                // 绑定关闭事件（使用 onclick 更可靠）
                closeBtn.onclick = function() {
                    reminderOverlay.style.display = 'none';
                    localStorage.setItem('reminderClosed', 'true');
                };
            } else {
                console.warn('提醒弹窗元素未找到');
            }

            // 其他初始化（与原来相同）
            document.getElementById('lookupBody').classList.remove('open');
            document.getElementById('lookupArrow').classList.remove('open');
            document.getElementById('lookupBadge').textContent = '点击展开';

            document.querySelectorAll('.machine-bar .mbtn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.machine-bar .mbtn').forEach(function(b) { b.classList.remove('active'); });
                    this.classList.add('active');
                    appData.machine = this.dataset.m;
                    loadMachineParams(appData.machine);
                    document.getElementById('segmentResult').style.display = 'none';
                    saveData();
                });
            });

            document.getElementById('saveTemplateBtn').addEventListener('click', saveCurrentTemplate);
            document.getElementById('resetTemplateBtn').addEventListener('click', resetTemplate);

            ['defHeight','defBulk','defMoisture'].forEach(function(id) {
                document.getElementById(id).addEventListener('input', function() {
                    updateMoistureHint();
                    renderLookup();
                    renderSegments();
                    saveData();
                });
            });

            document.querySelectorAll('.shift-selector .sbtn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.shift-selector .sbtn').forEach(function(b) { b.classList.remove('active'); });
                    this.classList.add('active');
                    appData.shift = this.dataset.shift;
                    updateShiftDisplay();
                    var times = getShiftTimes(appData.shift);
                    if (times) { setTimeInputs('invStart', times.start); setTimeInputs('invEnd', times.end); }
                    saveData();
                });
            });

            document.getElementById('editShiftBtn').addEventListener('click', function() {
                var s = appData.shift || 'day', label = s === 'day' ? '白班' : '夜班';
                var times = getShiftTimes(s);
                var cur = times ? String(times.start.h).padStart(2,'0')+':'+String(times.start.m).padStart(2,'0')+'-'+String(times.end.h).padStart(2,'0')+':'+String(times.end.m).padStart(2,'0') : '--:--';
                var inp = prompt('编辑'+label+'时间 (HH:MM-HH:MM)：', cur);
                if (inp && inp.match(/^\d{2}:\d{2}-\d{2}:\d{2}$/)) {
                    var parts = inp.split('-'), ss = parseTimeStr(parts[0]), ee = parseTimeStr(parts[1]);
                    if (ss && ee) {
                        if (s === 'day') { appData.shiftTimes.dayStart = parts[0]; appData.shiftTimes.dayEnd = parts[1]; }
                        else { appData.shiftTimes.nightStart = parts[0]; appData.shiftTimes.nightEnd = parts[1]; }
                        updateShiftDisplay();
                        saveData();
                        showToast('✅ 已更新');
                    }
                }
            });

            document.querySelectorAll('.quick-freq .qf-btn').forEach(function(btn) {
                btn.addEventListener('click', function() { document.getElementById('freqSingle').value = this.dataset.f; calcSingle(); });
            });

            document.getElementById('calcSingleBtn').addEventListener('click', calcSingle);
            document.getElementById('copySingleBtn').addEventListener('click', copySingleResult);
            document.getElementById('freqSingle').addEventListener('keyup', function(e) { if (e.key === 'Enter') calcSingle(); });

            document.getElementById('addSegmentBtn').addEventListener('click', addSegmentFromNow);
            document.getElementById('clearSegmentsBtn').addEventListener('click', clearAllSegments);
            document.getElementById('calcSegmentsBtn').addEventListener('click', function() { calcSegments(); });
            document.getElementById('saveSegmentResultBtn').addEventListener('click', saveSegmentResult);
            document.getElementById('screenshotSegResultBtn').addEventListener('click', screenshotResult);
            document.getElementById('copySegResultBtn').addEventListener('click', copySegResultText);

            document.getElementById('shareSegResultBtn').addEventListener('click', shareCurrentText);
            document.getElementById('shareScreenshotBtn').addEventListener('click', shareCurrentScreenshot);
            document.getElementById('shareExcelBtn').addEventListener('click', shareCurrentExcelWrapper);

            document.getElementById('exportHistoryBtn').addEventListener('click', exportHistoryExcel);
            document.getElementById('clearHistoryBtn').addEventListener('click', clearAllHistory);
            document.getElementById('undoDeleteBtn').addEventListener('click', undoDelete);
            document.getElementById('calcInverseBtn').addEventListener('click', calcInverse);

            document.getElementById('lookupToggle').addEventListener('click', function() {
                var b = document.getElementById('lookupBody'), a = document.getElementById('lookupArrow'), g = document.getElementById('lookupBadge');
                b.classList.toggle('open'); a.classList.toggle('open');
                g.textContent = b.classList.contains('open') ? '点击收起' : '点击展开';
            });

            document.getElementById('filterMachine').addEventListener('change', renderHistory);
            document.getElementById('filterDateStart').addEventListener('change', renderHistory);
            document.getElementById('filterDateEnd').addEventListener('change', renderHistory);
            document.getElementById('clearFilterBtn').addEventListener('click', function() {
                document.getElementById('filterMachine').value = 'all';
                document.getElementById('filterDateStart').value = '';
                document.getElementById('filterDateEnd').value = '';
                renderHistory();
            });

            if (!getSegments().length) addSegmentFromNow();
            setInterval(saveData, 30000);
        }

        // 其余辅助函数（如 calcSegments, screenshotResult, renderHistory 等）均与原来相同，此处省略。
        // 请确保你的完整文件中包含所有原有函数。

        document.addEventListener('DOMContentLoaded', init);
    })();
</script>
